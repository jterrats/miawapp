pluginManagement {
  repositories { google(); mavenCentral(); gradlePluginPortal() }
}

dependencyResolutionManagement {
  repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
  repositories {
    google()
    mavenCentral()
    // S3 SOLO para Salesforce
    maven {
      url "https://s3.amazonaws.com/inapp.salesforce.com/public/android"
      content {
        includeGroup "com.salesforce.service"
        includeGroupByRegex "com\\.salesforce\\..*"
      }
    }
  }
}

rootProject.name = "miawapp"

include ':app'

include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

include ':capacitor-android'
project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')

// Tu plugin local
include ':capacitor-salesforce-miaw'
project(':capacitor-salesforce-miaw').projectDir = new File('../node_modules/capacitor-salesforce-miaw/android')