<ion-header>
  <ion-toolbar>
    <ion-title>Support</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h2>Need help?</h2>
  <p>Click the chat button to start a conversation with our support team.</p>

  <!-- Floating Action Button -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openChat()" [disabled]="isLoading" color="primary">
      <ion-icon name="chatbubble-ellipses"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- Loading overlay -->
  <div class="loading-overlay" *ngIf="isLoading">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <div class="loading-text">Opening chat...</div>
  </div>
</ion-content>
